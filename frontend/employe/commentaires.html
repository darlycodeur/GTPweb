<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commentaires — GTP</title>
  <link rel="stylesheet" href="../shared/css/global.css">
  <link rel="stylesheet" href="../shared/css/sidebar.css">
</head>
<body>
<div class="app-container">

  <aside class="sidebar">
    <div class="sidebar-logo"><h2>G<span>T</span>P</h2></div>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebarAvatar">E</div>
      <div class="sidebar-user-info">
        <p id="sidebarNom">Chargement...</p>
        <span>Employé</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <p class="nav-section-title">Principal</p>
      <ul>
        <li class="nav-item"><a href="dashboard.html"><span class="icon">📊</span> Dashboard</a></li>
        <li class="nav-item"><a href="mes-taches.html"><span class="icon">✅</span> Mes Tâches</a></li>
        <li class="nav-item"><a href="chronometre.html"><span class="icon">⏱️</span> Chronomètre</a></li>
        <li class="nav-item"><a href="rapport-temps.html"><span class="icon">📈</span> Rapport Temps</a></li>
        <li class="nav-item"><a href="commentaires.html" class="active"><span class="icon">💬</span> Commentaires</a></li>
        <li class="nav-item"><a href="notifications.html"><span class="icon">🔔</span> Notifications</a></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btnLogout">🚪 Déconnexion</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-title">
        <h1>💬 Commentaires</h1>
        <p>Discussions sur les tâches</p>
      </div>
    </div>

    <div class="card">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Sélectionner une tâche</label>
        <select id="selectTache" class="form-control">
          <option value="">-- Choisir une tâche --</option>
        </select>
      </div>
    </div>

    <div id="zoneCommentaires" style="display:none">

      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Nouveau commentaire</h3>
        </div>
        <div class="form-group">
          <textarea id="contenuCommentaire" class="form-control" rows="3"
            placeholder="Écrire un commentaire..."></textarea>
        </div>
        <div style="display:flex; justify-content:flex-end">
          <button class="btn btn-primary" id="btnEnvoyer">Envoyer 💬</button>
        </div>
      </div>

      <div id="listeCommentaires"></div>

    </div>

    <div id="placeholderSelect" class="card text-center" style="padding:48px; color:var(--gray)">
      <p style="font-size:48px">💬</p>
      <p style="margin-top:12px">Sélectionnez une tâche pour voir ses commentaires</p>
    </div>

  </main>
</div>

<script src="../shared/js/api.js"></script>
<script src="../shared/js/auth-guard.js"></script>
<script src="../shared/js/role-guard.js"></script>
<script src="commentaires.js"></script>
<script src="../shared/js/confirm-modal.js"></script>
<script src="../shared/js/auto-avatar.js"></script>
</body>
</html>
