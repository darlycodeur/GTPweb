<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — GTP</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../shared/css/global.css">
  <link rel="stylesheet" href="../shared/css/auth.css">
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <h1>G<span>T</span>P</h1>
        <p>Gestion des Tâches & Projets</p>
      </div>

      <h2 class="auth-title">Connexion</h2>

      <!-- Alerte -->
      <div class="alert alert-error" id="alertError"></div>

      <!-- Formulaire -->
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="votre@email.com">
      </div>

      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <div class="password-wrapper">
          <input type="password" id="motDePasse" class="form-control" placeholder="••••••••">
          <button type="button" class="password-toggle" id="togglePassword" aria-label="Afficher le mot de passe">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn btn-primary w-100 mt-2" id="btnLogin">
        Se connecter
      </button>

      <div class="auth-footer">
        Pas encore de compte ?
        <a href="register.html">S'inscrire</a>
      </div>

      <div style="text-align:center; margin-top:16px;">
        <a href="#" id="btnReset" style="font-size:12px; color:var(--gray);">🔄 Réinitialiser l'application</a>
      </div>

    </div>
  </div>

  <script src="../shared/js/api.js"></script>
  <script src="login.js"></script>
</body>
</html>
